<script>
// ──────────────────────────────────────────────
//  工具：HTML escape（XSS 防護）
// ──────────────────────────────────────────────
function esc(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str || ''));
    return d.innerHTML;
}

function safeText(el, text) {
    el.textContent = text || '';
}

// ──────────────────────────────────────────────
//  工具：URL 安全驗證
// ──────────────────────────────────────────────
function safeUrl(url) {
    if (!url) return null;
    try {
        const u = new URL(url);
        if (u.protocol === 'https:' || u.protocol === 'http:') return u.href;
    } catch(e) {}
    return null;
}

// ──────────────────────────────────────────────
//  加密模組（Web Crypto API，AES-GCM + PBKDF2）
// ──────────────────────────────────────────────
const STORAGE_KEY = 'vault_enc_v1';
const SALT_KEY    = 'vault_salt_v1';
const SESSION_KEY = 'vault_session_key'; // sessionStorage

async function deriveKey(password, salt) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
        'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 310000, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        true,
        ['encrypt', 'decrypt']
    );
}

async function encryptData(key, data) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const enc = new TextEncoder();
    const ciphertext = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        key,
        enc.encode(JSON.stringify(data))
    );
    // 合併 iv + ciphertext，base64 存儲
    const combined = new Uint8Array(iv.byteLength + ciphertext.byteLength);
    combined.set(iv, 0);
    combined.set(new Uint8Array(ciphertext), iv.byteLength);
    return btoa(String.fromCharCode(...combined));
}

async function decryptData(key, b64) {
    const combined = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const iv = combined.slice(0, 12);
    const ciphertext = combined.slice(12);
    const dec = new TextDecoder();
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
    return JSON.parse(dec.decode(plain));
}

// 把 CryptoKey 匯出成 base64 存進 sessionStorage（分頁關閉即清除）
async function cacheKeyInSession(key) {
    const raw = await crypto.subtle.exportKey('raw', key);
    sessionStorage.setItem(SESSION_KEY, btoa(String.fromCharCode(...new Uint8Array(raw))));
}

async function loadKeyFromSession() {
    const b64 = sessionStorage.getItem(SESSION_KEY);
    if (!b64) return null;
    const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    return crypto.subtle.importKey('raw', raw, { name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']);
}

// ──────────────────────────────────────────────
//  全域狀態
// ──────────────────────────────────────────────
const categories = {
    '個人': ['遊戲', '社群', '工具', '購物', '金融', '其他'],
    '工作': ['官網', '社群平台', '伺服器', '軟體', '人員', '其他'],
    '家人': ['媽媽', '琦琦', '公公', '婆婆', '其他']
};

let entries = [];
let cryptoKey = null;
let editingId = null;
let currentParentFilter = 'all';
let currentSubFilter = 'all';
let visibilityState = {};
let pendingDeleteId = null;

// ──────────────────────────────────────────────
//  鎖定 / 解鎖流程
// ──────────────────────────────────────────────
async function init() {
    const hasSalt = localStorage.getItem(SALT_KEY);
    const cachedKey = await loadKeyFromSession();

    if (cachedKey) {
        // 同分頁 session，自動解鎖
        cryptoKey = cachedKey;
        await loadEntries();
        showMain();
        return;
    }

    if (!hasSalt) {
        // 第一次使用：顯示設定主密碼 UI
        document.getElementById('lockHint').textContent = '請設定您的主密碼';
        document.getElementById('lockBtnText').textContent = '設定並解鎖';
        document.getElementById('masterConfirm').classList.remove('hidden');
    }
    // lockScreen 已預設顯示
}

async function handleUnlock() {
    const pw = document.getElementById('masterInput').value;
    const errEl = document.getElementById('lockError');
    errEl.classList.add('hidden');

    if (!pw) return;

    const hasSalt = localStorage.getItem(SALT_KEY);

    if (!hasSalt) {
        // 第一次設定
        const pw2 = document.getElementById('masterConfirm').value;
        if (pw !== pw2) {
            errEl.textContent = '兩次密碼不一致';
            errEl.classList.remove('hidden');
            return;
        }
        const salt = crypto.getRandomValues(new Uint8Array(16));
        localStorage.setItem(SALT_KEY, btoa(String.fromCharCode(...salt)));
        cryptoKey = await deriveKey(pw, salt);
        await cacheKeyInSession(cryptoKey);
        entries = [];
        await saveEntries();
        showMain();
    } else {
        // 驗證主密碼
        try {
            const saltB64 = localStorage.getItem(SALT_KEY);
            const salt = Uint8Array.from(atob(saltB64), c => c.charCodeAt(0));
            const key = await deriveKey(pw, salt);
            const enc = localStorage.getItem(STORAGE_KEY);
            if (enc) {
                entries = await decryptData(key, enc);
            } else {
                entries = [];
            }
            cryptoKey = key;
            await cacheKeyInSession(cryptoKey);
            showMain();
        } catch(e) {
            errEl.textContent = '密碼錯誤，請再試一次';
            errEl.classList.remove('hidden');
            document.getElementById('masterInput').value = '';
        }
    }
}

function showMain() {
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('mainContent').classList.remove('hidden');
    document.getElementById('addBtn').classList.remove('hidden');
    document.getElementById('addBtn').style.display = 'flex';
    renderSubFilterBar();
    render();
}

function lockVault() {
    sessionStorage.removeItem(SESSION_KEY);
    cryptoKey = null;
    entries = [];
    document.getElementById('mainContent').classList.add('hidden');
    document.getElementById('addBtn').style.display = 'none';
    document.getElementById('lockScreen').classList.remove('hidden');
    document.getElementById('masterInput').value = '';
    document.getElementById('lockHint').textContent = '輸入主密碼以解鎖';
    document.getElementById('lockBtnText').textContent = '解鎖';
    document.getElementById('masterConfirm').classList.add('hidden');
    document.getElementById('lockError').classList.add('hidden');
}

// ──────────────────────────────────────────────
//  存取加密資料
// ──────────────────────────────────────────────
async function saveEntries() {
    if (!cryptoKey) return;
    const enc = await encryptData(cryptoKey, entries);
    localStorage.setItem(STORAGE_KEY, enc);
}

async function loadEntries() {
    const enc = localStorage.getItem(STORAGE_KEY);
    if (!enc || !cryptoKey) { entries = []; return; }
    try {
        entries = await decryptData(cryptoKey, enc);
    } catch(e) {
        entries = [];
    }
}

// ──────────────────────────────────────────────
//  分類 / 篩選
// ──────────────────────────────────────────────
function updateSubOptions() {
    const parent = document.getElementById('fParent').value;
    const subSelect = document.getElementById('fSub');
    subSelect.innerHTML = '';
    categories[parent].forEach(sub => {
        const opt = document.createElement('option');
        opt.value = sub;
        opt.textContent = sub;
        subSelect.appendChild(opt);
    });
}

function setFilter(value, type) {
    if (type === 'parent') {
        currentParentFilter = value;
        currentSubFilter = 'all';
        document.querySelectorAll('[id^="m-"]').forEach(el => {
            el.className = "flex-1 py-2.5 rounded-full text-xs font-bold text-gray-400 transition-all duration-300";
        });
        document.getElementById('m-' + value).className = "tab-main-active flex-1 py-2.5 rounded-full text-xs font-bold transition-all duration-300";
    } else {
        currentSubFilter = value;
    }
    renderSubFilterBar();
    render();
}

function renderSubFilterBar() {
    const bar = document.getElementById('subFilterBar');
    bar.innerHTML = '';
    if (currentParentFilter === 'all') return;

    const makeBtn = (label, val) => {
        const btn = document.createElement('button');
        btn.textContent = label;
        btn.className = `px-5 py-1.5 rounded-full text-[10px] font-bold shrink-0 transition-all ${currentSubFilter === val ? 'tab-sub-active' : 'text-gray-400 bg-white/30'}`;
        btn.onclick = () => setFilter(val, 'sub');
        bar.appendChild(btn);
    };

    makeBtn('全部', 'all');
    categories[currentParentFilter].forEach(s => makeBtn(s, s));
}

// ──────────────────────────────────────────────
//  密碼強度
// ──────────────────────────────────────────────
function calcStrength(pw) {
    if (!pw) return 0;
    let score = 0;
    if (pw.length >= 8) score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/\d/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    return Math.min(4, score);
}

function updateStrength() {
    const pw = document.getElementById('fPass').value;
    const score = calcStrength(pw);
    const colors = ['', 'bg-red-300', 'bg-orange-300', 'bg-yellow-300', 'bg-green-400'];
    const labels = ['', '太弱', '普通', '還不錯', '非常強'];
    for (let i = 1; i <= 4; i++) {
        const bar = document.getElementById('sb' + i);
        bar.className = `flex-1 rounded-full ${i <= score ? colors[score] : 'bg-gray-100'}`;
    }
    const lbl = document.getElementById('strengthLabel');
    lbl.textContent = pw ? labels[score] : '';
    lbl.style.color = ['', '#f9a8a8', '#fdba74', '#fcd34d', '#86efac'][score] || '';
}

function generatePassword() {
    const chars = 'abcdefghijkmnpqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789!@#$%^&*';
    let pw = '';
    const arr = crypto.getRandomValues(new Uint8Array(16));
    arr.forEach(b => pw += chars[b % chars.length]);
    document.getElementById('fPass').value = pw;
    updateStrength();
    showToast('已產生隨機密碼');
}

// ──────────────────────────────────────────────
//  渲染列表（全用 DOM API，無 innerHTML 拼字串）
// ──────────────────────────────────────────────
function render() {
    const list = document.getElementById('passwordList');
    const empty = document.getElementById('emptyState');
    const search = document.getElementById('searchInput').value.toLowerCase();
    const sortVal = document.getElementById('sortOrder').value;

    list.innerHTML = '';

    let filtered = entries.filter(e => {
        const q = (e.site + e.user + (e.note || '')).toLowerCase();
        const matchSearch = q.includes(search);
        const matchParent = currentParentFilter === 'all' || e.parent === currentParentFilter;
        const matchSub = currentSubFilter === 'all' || e.sub === currentSubFilter;
        return matchSearch && matchParent && matchSub;
    });

    if (sortVal === 'newest')     filtered.sort((a,b) => b.id - a.id);
    else if (sortVal === 'oldest') filtered.sort((a,b) => a.id - b.id);
    else if (sortVal === 'alpha-asc')  filtered.sort((a,b) => a.site.localeCompare(b.site, 'zh-Hant'));
    else if (sortVal === 'alpha-desc') filtered.sort((a,b) => b.site.localeCompare(a.site, 'zh-Hant'));

    if (filtered.length === 0) {
        empty.classList.remove('hidden');
        return;
    }
    empty.classList.add('hidden');

    filtered.forEach(e => buildCard(e, list));
}

    delBtn.addEventListener('click', () => openConfirm(e.id, e.site));

    // ── 資料列 ──

    const userRow = document.createElement('div');
    userRow.className = "bg-[#faf9f8] p-4 rounded-2xl flex justify-between items-center active:bg-gray-100 border border-gray-50/50 cursor-pointer group transition-all";
    userRow.addEventListener('click', () => copyText(e.user));

    const userLabel = document.createElement('span');

    userLabel.textContent = 'User';

        : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>`;

    // 備註
    if (e.note) {
        const noteEl = document.createElement('div');

        // 備註允許換行，但要先 escape 再還原換行為 <br>
        noteEl.innerHTML = esc(e.note).replace(/\n/g, '<br>');
        body.appendChild(noteEl);
    }

    card.append(header, body);
    container.appendChild(card);
}

// ──────────────────────────────────────────────
//  顯示/隱藏密碼
// ──────────────────────────────────────────────
function togglePassword(id) {
    visibilityState[id] = !visibilityState[id];
    const passEl = document.getElementById(`pass-text-${id}`);
    const iconEl = document.getElementById(`pass-icon-${id}`);
    const entry = entries.find(e => String(e.id) === String(id));

    if (visibilityState[id]) {
        passEl.textContent = entry.pass;
        passEl.classList.remove('text-gray-300', 'tracking-[0.3em]');
        passEl.classList.add('text-gray-600', 'font-mono');
        iconEl.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"></path>`;
    } else {
        passEl.textContent = '••••••••';
        passEl.classList.add('text-gray-300', 'tracking-[0.3em]');
        passEl.classList.remove('text-gray-600', 'font-mono');
        iconEl.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>`;
    }
}

// ──────────────────────────────────────────────
//  Modal（新增/編輯）
// ──────────────────────────────────────────────
function openModal() {
    document.getElementById('modal').style.display = 'flex';
    updateSubOptions();
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
    document.body.style.overflow = 'auto';
    editingId = null;
    document.getElementById('modalTitle').textContent = '記下一筆密碼';
    ['fSite','fUrl','fUser','fPass','fNote'].forEach(id => document.getElementById(id).value = '');
    updateStrength();
}

async function saveEntry() {
    const data = {
        id: editingId || Date.now().toString(),
        parent: document.getElementById('fParent').value,
        sub: document.getElementById('fSub').value,
        site: document.getElementById('fSite').value.trim(),
        url: document.getElementById('fUrl').value.trim(),
        user: document.getElementById('fUser').value.trim(),
        pass: document.getElementById('fPass').value.trim(),
        note: document.getElementById('fNote').value.trim()
    };

    if (!data.site || !data.user || !data.pass) return showToast('請填寫必填欄位');

    if (editingId) {
        const idx = entries.findIndex(e => String(e.id) === String(editingId));
        entries[idx] = data;
    } else {
        entries.push(data);
    }

    await saveEntries();
    closeModal();
    render();
    showToast('存檔成功');
}

function editEntry(id) {
    const e = entries.find(x => String(x.id) === String(id));
    if (!e) return;
    editingId = String(id);
    document.getElementById('fParent').value = e.parent;
    updateSubOptions();
    document.getElementById('fSub').value = e.sub;
    document.getElementById('fSite').value = e.site;
    document.getElementById('fUrl').value = e.url || '';
    document.getElementById('fUser').value = e.user;
    document.getElementById('fPass').value = e.pass;
    document.getElementById('fNote').value = e.note || '';
    document.getElementById('modalTitle').textContent = '修改紀錄';
    document.getElementById('modal').style.display = 'flex';
    updateStrength();
}

// ──────────────────────────────────────────────
//  自訂刪除確認
// ──────────────────────────────────────────────
function openConfirm(id, siteName) {
    pendingDeleteId = id;
    const msg = document.getElementById('confirmMsg');
    safeText(msg, `「${siteName}」的紀錄將永久移除`);

    const sheet = document.getElementById('confirmSheet');
    const bg = document.getElementById('overlayBg');
    sheet.classList.remove('hidden');
    bg.classList.remove('hidden');
    requestAnimationFrame(() => sheet.classList.remove('hidden-sheet'));

    document.getElementById('confirmBtn').onclick = () => doDelete();
}

function closeConfirm() {
    const sheet = document.getElementById('confirmSheet');
    const bg = document.getElementById('overlayBg');
    sheet.classList.add('hidden-sheet');
    setTimeout(() => {
        sheet.classList.add('hidden');
        bg.classList.add('hidden');
    }, 300);
    pendingDeleteId = null;
}

async function doDelete() {
    if (!pendingDeleteId) return;
    entries = entries.filter(x => String(x.id) !== String(pendingDeleteId));
    await saveEntries();
    render();
    showToast('已刪除');
    closeConfirm();
}

// ──────────────────────────────────────────────
//  複製（Clipboard API）
// ──────────────────────────────────────────────
async function copyText(text) {
    try {
        await navigator.clipboard.writeText(text);
    } catch(e) {
        // 降級處理
        const el = document.createElement('textarea');
        el.value = text;
        el.style.position = 'fixed';
        el.style.opacity = '0';
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
    }
    showToast('已複製到剪貼簿');
}

// ──────────────────────────────────────────────
//  Toast
// ──────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.opacity = '1';
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.style.opacity = '0', 2000);
}

// ──────────────────────────────────────────────
//  匯出 / 匯入（明文備份，提示使用者妥善保存）
// ──────────────────────────────────────────────
function exportJSON() {
    const a = document.createElement('a');
    const dataStr = JSON.stringify(entries, null, 2);
    a.href = URL.createObjectURL(new Blob([dataStr], {type: "application/json"}));
    a.download = `vault_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    showToast('備份已導出（請妥善保存）');
}

function importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
        try {
            const imported = JSON.parse(ev.target.result);
            if (!Array.isArray(imported)) throw new Error('格式錯誤');

            // 合併匯入：以 id 去重，新資料優先
            const existingIds = new Set(entries.map(x => x.id));
            let merged = 0;
            imported.forEach(item => {
                if (!existingIds.has(item.id)) {
                    entries.push(item);
                    merged++;
                }
            });

            if (merged === 0) {
                showToast('無新資料需要合併');
            } else {
                await saveEntries();
                render();
                showToast(`已合併 ${merged} 筆新資料`);
            }
        } catch (err) {
            showToast('檔案格式錯誤');
        }
    };
    reader.readAsText(file);
    e.target.value = '';
}

// ──────────────────────────────────────────────
//  動態產生 Apple Touch Icon（canvas → PNG）
// ──────────────────────────────────────────────
(function generateAppleIcon() {
    const size = 180;
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const r = 36;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(size-r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size-r);
    ctx.quadraticCurveTo(size, size, size-r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size-r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = '#f2e9e4';
    ctx.fill();

    ctx.strokeStyle = '#4a4e69';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // 鎖身
    const lx=50, ly=95, lw=80, lh=58, lr=8;
    ctx.beginPath();
    ctx.moveTo(lx+lr, ly); ctx.lineTo(lx+lw-lr, ly);
    ctx.quadraticCurveTo(lx+lw, ly, lx+lw, ly+lr);
    ctx.lineTo(lx+lw, ly+lh-lr);
    ctx.quadraticCurveTo(lx+lw, ly+lh, lx+lw-lr, ly+lh);
    ctx.lineTo(lx+lr, ly+lh);
    ctx.quadraticCurveTo(lx, ly+lh, lx, ly+lh-lr);
    ctx.lineTo(lx, ly+lr);
    ctx.quadraticCurveTo(lx, ly, lx+lr, ly);
    ctx.closePath();
    ctx.stroke();

    // 鎖梁
    ctx.beginPath();
    ctx.moveTo(70, 95); ctx.lineTo(70, 75);
    ctx.arc(90, 75, 20, Math.PI, 0);
    ctx.lineTo(110, 95);
    ctx.stroke();

    // 鎖孔
    ctx.beginPath();
    ctx.arc(90, 124, 5, 0, Math.PI * 2);
    ctx.stroke();

    const link = document.getElementById('appleIcon');
    if (link) link.href = c.toDataURL('image/png');
})();

// ──────────────────────────────────────────────
//  初始化
// ──────────────────────────────────────────────
init();
